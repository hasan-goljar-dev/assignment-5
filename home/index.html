<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- DaisyUI + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Favicon -->
  <link rel="shortcut icon" href="../assets/github-logo.png">

  <style>
    * {
      font-family: "Outfit", sans-serif;
    }
  </style>

</head>

<body class="bg-base-100">
  <!-- Nav bar -->
  <header>
    <div class="navbar bg-base-100 shadow-sm">

      <div class="flex-1">
        <div class="flex items-center gap-3">
          <img class="w-12" src="../assets/github-logo.png" alt="">
          <a class="text-2xl font-bold">GitHub Issues Tracker</a>
        </div>
      </div>

      <div class="join">

        <label class="input validator join-item">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">

              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>

            </g>
          </svg>

          <input type="search" placeholder="Search issues..." required />
        </label>

        <button id="search-btn" class="btn btn-primary join-item">
          <img class="w-4" src="../assets/Plus.png" alt="">
          New Issue
        </button>

      </div>

    </div>
  </header>


  <!-- Select Buttons -->
  <section class="bg-base-200 shadow max-w-[80%] mx-auto mt-4 p-4">

    <button id="Select-all" onclick="switchTab('all')"
      class="px-5 py-1.5 rounded-full border-2 text-sm font-medium cursor-pointer transition-all duration-200">All</button>
    <button id="Select-open" onclick="switchTab('open')"
      class="px-5 py-1.5 rounded-full border-2 text-sm font-medium cursor-pointer transition-all duration-200">Open</button>
    <button id="Select-closed" onclick="switchTab('closed')"
      class="px-5 py-1.5 rounded-full border-2 text-sm font-medium cursor-pointer transition-all duration-200">Closed</button>

  </section>
  <!-- Issue Counter Section -->
  <section class="bg-base-200 max-w-[80%] mx-auto p-4 mt-3 rounded-lg">
    <div class="flex justify-between items-center">

      <div class="flex items-center gap-3">
        <img class="w-10 border-2 border-blue-300/50 rounded-full p-1" src="../assets/Aperture.png" alt="">
        <div>
          <p class="font-bold"> <span id="issue-count">0</span> Issues</p>
          <p class="text-sm text-gray-500 ">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex gap-1 text-sm">
        <span class="flex items-center gap-2">
          <span class="w-6 h-6 "></span>Open<img src="../assets/Open-Status.png" alt="">
        </span>
        <span class="flex items-center gap-2">
          <span class="w-6 h-6 "></span>Closed<img src="../assets/Closed-Status.png" alt="">
        </span>
      </div>

    </div>
  </section>
  <!-- All Cards -->
  <section id="all-container"
    class="max-w-[80%] mx-auto mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 hidden">
  </section>
  <section id="open-container"
    class="max-w-[80%] mx-auto mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 hidden">
  </section>

  <section id="closed-container"
    class="max-w-[80%] mx-auto mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 hidden">
  </section>
  <!-- Modal -->
   <!-- You can open the modal using ID.showModal() method -->
<button class="btn" onclick="my_modal_3.showModal()">open modal</button>
<dialog id="my_modal_3" class="modal">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click on ✕ button to close</p>
  </div>
</dialog>

  <script src="../script/all-conatiner.js"></script>
</body>

</html>
